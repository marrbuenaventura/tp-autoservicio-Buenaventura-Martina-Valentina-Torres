<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sport & Sweet · Productos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/stylesCliente.css">
</head>
<body>

<div class="bg-blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="blob blob4"></div>
</div>

<header>
  <img class="logo-img" src="/assets/img/logo.png" alt="Sport & Sweet logo">
  <div class="header-right">
    <span class="saludo">Hola, <strong id="nombreUsuario">!</strong></span>
    <button class="cart-btn" onclick="toggleDrawer(true)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
      </svg>
      <span class="cart-count" id="cartCount" style="display:none">0</span>
    </button>
  </div>
</header>

<main>
  <h1 class="titulo-page">Nuestros productos</h1>
  <p class="subtitulo-page">Elegi lo que más te guste y agregalo al carrito.</p>

  <section class="seccion">
    <div class="seccion-header">
      <span class="seccion-titulo">Zapatillas</span>
      <div class="seccion-linea"></div>
    </div>
    <div class="grid-productos" id="gridZapatillas"></div>
  </section>

  <section class="seccion">
    <div class="seccion-header">
      <span class="seccion-titulo">Ropa</span>
      <div class="seccion-linea"></div>
    </div>
    <div class="grid-productos" id="gridRopa"></div>
  </section>
</main>

<a class="footer-link" href="http://localhost:3000/dashboard/index">Administración</a>

<div class="overlay" id="overlay" onclick="toggleDrawer(false)"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-titulo">Tu carrito</span>
    <button class="drawer-cerrar" onclick="toggleDrawer(false)">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-footer">
    <div class="drawer-total">
      <span>Total</span>
      <span id="drawerTotal">$0</span>
    </div>
    <button class="drawer-btn" onclick="finalizarCompra()">Finalizar compra</button>
  </div>
</aside>
<!--
  agregamos un modal de confirmacion para que el usuario
  pueda revisar el total de la compra antes de continuar.
  si confirma, se genera el ticket y se redirige a ticket.html
-->

<div class="modal-overlay" id="modalOverlay" style="display:none;position:fixed;inset:0;background:rgba(45,31,46,0.4);z-index:200;align-items:center;justify-content:center;">
  <div style="background:var(--fondo);border-radius:24px;padding:36px;max-width:360px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.2);">
    <h3 style="font-family:'Playfair Display',serif;font-size:22px;font-style:italic;margin-bottom:12px;">Confirmar compra</h3>
    <p id="modalTexto" style="font-size:14px;color:var(--gris);margin-bottom:28px;line-height:1.6;"></p>
    <div style="display:flex;gap:12px;">
      <button onclick="cerrarModal()" style="flex:1;padding:13px;border-radius:14px;border:1.5px solid rgba(0,0,0,0.1);background:white;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;">Cancelar</button>
      <button onclick="confirmarCompra()" style="flex:1;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--rosa),var(--lila));color:var(--texto);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;">Sí, comprar</button>
    </div>
  </div>
</div>

<script src="/js/productos.js"></script>

</body>
</html>
