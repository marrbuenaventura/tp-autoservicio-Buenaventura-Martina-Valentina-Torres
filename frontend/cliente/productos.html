<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sport & Sweet · Productos</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/stylesCliente.css">
</head>

<body>

  <div class="bg-blobs">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div class="blob blob4"></div>
  </div>

  <header>
    <img class="logo-img" src="/assets/img/logo.png" alt="Sport & Sweet logo">
    <div class="header-right">
      <span class="saludo">Hola, <strong id="nombreUsuario">!</strong></span>
      <button class="cart-btn" onclick="toggleDrawer(true)">
        <img class="cart-icon" src="/assets/img/carrito-icon.svg" alt="Carrito">
        <span class="cart-count oculto" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <main>
    <h1 class="titulo-page">Nuestros productos</h1>
    <p class="subtitulo-page">Elegi lo que más te guste y agregalo al carrito.</p>

    <section class="seccion">
      <div class="seccion-header">
        <span class="seccion-titulo">Zapatillas</span>
        <div class="seccion-linea"></div>
      </div>
      <div class="grid-productos" id="gridZapatillas"></div>
    </section>

    <section class="seccion">
      <div class="seccion-header">
        <span class="seccion-titulo">Ropa</span>
        <div class="seccion-linea"></div>
      </div>
      <div class="grid-productos" id="gridRopa"></div>
    </section>
  </main>

  <a class="footer-link" href="/dashboard/index">Administración</a>

  <div class="overlay" id="overlay" onclick="toggleDrawer(false)"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <span class="drawer-titulo">Tu carrito</span>
      <button class="drawer-cerrar" onclick="toggleDrawer(false)">✕</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-footer">
      <div class="drawer-total">
        <span>Total</span>
        <span id="drawerTotal">$0</span>
      </div>
      <button class="drawer-btn" onclick="finalizarCompra()">Finalizar compra</button>
    </div>
  </aside>

  <div class="modal-overlay oculto" id="modalOverlay">
    <div class="modal-card">
      <h3 class="modal-titulo">Confirmar compra</h3>
      <p class="modal-texto" id="modalTexto"></p>
      <div class="modal-botones">
        <button class="modal-btn modal-btn-cancelar" onclick="cerrarModal()">Cancelar</button>
        <button class="modal-btn modal-btn-confirmar" onclick="confirmarCompra()">Sí, comprar</button>
      </div>
    </div>
  </div>

  <script src="/js/productos.js"></script>

</body>

</html>
