<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sport & Sweet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/stylesCliente.css">
</head>
<body>

<div class="bg-blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="blob blob4"></div>
</div>

<header>
  <img class="logo-img" src="/assets/img/logo.png" alt="Sport & Sweet logo">
  <div class="alumnos">Buenaventura · Torres</div>
</header>

<main class="hero">
  <span class="eyebrow">✦ Autoservicio deportivo ✦</span>

  <h1 class="titulo">
    Sport<br><span class="amp">&</span><br>Sweet
  </h1>

  <p class="subtitulo">Tu ropa y zapatillas favoritas, en un solo lugar.</p>

  <div class="categorias">
    <div class="cat-pill">Zapatillas</div>
    <div class="cat-pill">Ropa</div>
  </div>

  <div class="form-container">
    <label class="form-label" for="nombre">¿Cómo te llamás?</label>
    <input
      class="form-input"
      type="text"
      id="nombre"
      placeholder="Tu nombre..."
      autocomplete="off"
    >
    <button class="form-btn" onclick="continuar()">Ver productos →</button>
  </div>
</main>

<a class="footer-link" href="http://localhost:3000/dashboard/index">Administración</a>

<script src="/js/bienvenida.js"></script>

</body>
</html>
